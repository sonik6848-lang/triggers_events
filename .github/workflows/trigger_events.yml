name: My first Workflow
on:
    workflow_dispatch:

    push:
        branches:
            - main

    pull_request:
        branches:
            - main

    schedule:
        - cron: '0 5 * * 1-5'

jobs:
    build:
         
        runs-on: ubuntu-latest
        steps:
            - name: checkout repository
              uses: actions/checkout@v3

            - name: Use node.js
              uses: actions/setup-node@v3
              with: 
               node-version: latest 

            - name: print a message
              run: echo "Hello World"
